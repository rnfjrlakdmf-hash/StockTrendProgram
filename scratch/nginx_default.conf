# Nginx Cache Zone Definition
# 10MB 크기의 공유 메모리(api_cache)를 할당하고 최대 100MB 크기까지 파일 캐싱 허용
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=60m use_temp_path=off;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Nginx Cache Global Settings
    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_methods GET;

    # 1. Backend APIs - Cache Enabled for Rankings/Market Data (0ms Response)
    location ~ ^/api/(market/rank|market/indices|market/status|market/news|market/major|market/market-insights|market/assets|market/calendar|etf) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # 15초 마이크로캐싱 활성화 (네이버처럼 즉시 렌더링 목적)
        proxy_cache api_cache;
        proxy_cache_valid 200 15s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        
        # 브라우저에 캐시 적중 여부 전달 헤더 추가 (디버깅용)
        add_header X-Cache-Status $upstream_cache_status;
        
        # 캐싱을 위한 추가 헤더 조율
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
    }

    # 2. General Backend APIs (No Cache)
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 3. Frontend pages (Next.js Application)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
