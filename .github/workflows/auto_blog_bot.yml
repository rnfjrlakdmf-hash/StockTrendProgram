name: Auto Blog Bot (KOR & US Market)

on:
  schedule:
    # 한국 증시 마감 후 발행 (KST 16:30 -> UTC 07:30)
    - cron: '30 07 * * 1-5'
    
    # 미국 증시 마감 후 발행 (KST 07:00 -> UTC 22:00)
    - cron: '00 22 * * 1-5'

  # 수동으로도 실행할 수 있도록 버튼 추가
  workflow_dispatch:
    inputs:
      market:
        description: '실행할 시장 (kor 또는 us)'
        required: true
        default: 'kor'
        type: choice
        options:
          - kor
          - us

jobs:
  post-blog:
    runs-on: ubuntu-latest
    
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 필요한 패키지 설치
        run: |
          cd backend
          pip install -r requirements.txt
          pip install firebase-admin google-generativeai yfinance python-dotenv GoogleNews holidays

      - name: Firebase 키 파일 생성 (Secret에서 가져오기)
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          echo "$FIREBASE_CREDENTIALS" > backend/firebase-adminsdk.json

      - name: 블로그 봇 실행 (스케줄링 시간에 따른 분기)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd backend
          
          # 수동 실행(workflow_dispatch)인 경우
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            python auto_blog_bot.py ${{ github.event.inputs.market }}
            exit 0
          fi
          
          # 스케줄 실행인 경우 (UTC 시간 기준으로 판단)
          CURRENT_HOUR=$(date +%H)
          
          # UTC 07:30 (KST 16:30) -> 한국 증시
          if [ "$CURRENT_HOUR" == "07" ]; then
            echo "Running KOR Market Bot..."
            python auto_blog_bot.py kor
            
          # UTC 22:00 (KST 07:00) -> 미국 증시
          elif [ "$CURRENT_HOUR" == "22" ]; then
            echo "Running US Market Bot..."
            python auto_blog_bot.py us
          fi
